<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sentrert bilde</title>

<style>
  :root{
    --bg: #0a3cff;
    --panel: rgba(0,0,0,0.35);
    --text: #ffffff;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  body {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
  }

  /* Wrapper for bilde + overlay */
  .stage{
    position: relative;
    width: min(1100px, 95vw);
    height: min(80vh, 900px);
    display: flex;
    align-items: center;
    justify-content: center;

    /* Fade-in */
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 700ms ease-out forwards;
  }

  @keyframes fadeIn{
    to { opacity: 1; transform: translateY(0); }
  }

  /* Selve bildet */
  #heroImg{
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);

    /* Zoom-effekt (smooth) */
    transition: transform 250ms ease, box-shadow 250ms ease;
    transform-origin: center center;
  }

  /* Zoom ved hover (PC) */
  @media (hover: hover) {
    .stage:hover #heroImg{
      transform: scale(1.04);
      box-shadow: 0 28px 80px rgba(0,0,0,0.55);
    }
  }

  /* Tekst/logo øverst */
  .overlay-top{
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    pointer-events: none; /* så du kan klikke bilde uten at overlay stopper det */
  }

  .brand{
    pointer-events: auto;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--panel);
    backdrop-filter: blur(6px);
  }

  .brand .dot{
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #ffffff;
    opacity: 0.9;
  }

  .brand .text{
    font-weight: 700;
    letter-spacing: 0.2px;
    font-size: 14px;
  }

  /* Knapp styling */
  .btn{
    pointer-events: auto;
    border: 0;
    border-radius: 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.16);
    color: #fff;
    font-weight: 650;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: transform 150ms ease, background 150ms ease;
  }

  .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,0.22); }
  .btn:active{ transform: translateY(0px) scale(0.98); }

  /* Liten hjelpetekst nederst */
  .hint{
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 12px;
    opacity: 0.9;
    backdrop-filter: blur(6px);
  }
</style>
</head>

<body>

  <div class="stage">
    <!-- Overlegg: logo/tekst + fullskjerm-knapp -->
    <div class="overlay-top">
      <!-- BYTT TEKST HER (evt. bytt til <img src="logo.png">) -->
      <div class="brand" aria-label="Logo/tekst">
        <span class="dot" aria-hidden="true"></span>
        <span class="text">DIN LOGO / TEKST</span>
      </div>

      <button class="btn" id="fsBtn" type="button">Fullskjerm</button>
    </div>

    <img
      id="heroImg"
      src="https://i.ebayimg.com/images/g/1LkAAOSwMQJnhFdo/s-l1200.jpg"
      alt="Bilde"
    />

    <div class="hint">Tips: Hover for zoom • Klikk “Fullskjerm”</div>
  </div>

<script>
  const fsBtn = document.getElementById("fsBtn");
  const stage = document.querySelector(".stage");

  async function toggleFullscreen() {
    try {
      if (!document.fullscreenElement) {
        await stage.requestFullscreen();
        fsBtn.textContent = "Avslutt fullskjerm";
      } else {
        await document.exitFullscreen();
        fsBtn.textContent = "Fullskjerm";
      }
    } catch (e) {
      alert("Fullskjerm støttes ikke her (eller ble blokkert av nettleseren).");
    }
  }

  fsBtn.addEventListener("click", toggleFullscreen);

  // Hold teksten riktig hvis bruker trykker ESC
  document.addEventListener("fullscreenchange", () => {
    fsBtn.textContent = document.fullscreenElement ? "Avslutt fullskjerm" : "Fullskjerm";
  });
</script>

</body>
</html>
